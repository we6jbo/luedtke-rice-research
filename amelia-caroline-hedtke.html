<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amelia Caroline Hedtke Record Viewer</title>
  <meta name="description" content="Public genealogy viewer for Amelia Caroline Hedtke records from the Carver County Historical Society Newspaper Resource.">
</head>
<body>
  <h1>Amelia Caroline Hedtke Record Viewer</h1>

  <p><strong>Intro:</strong> This page loads Amelia Caroline Hedtke research data from the live Luedtke Rice site.</p>

  <div id="status">Loading dataset...</div>
  <div id="output"></div>

  <p><strong>Exit:</strong> Review the record details and compare them against your source list and public research notes.</p>

  <script>
    (function () {
      var script = document.createElement("script");
      script.src = "https://luedtkerice.j03.page/amelia-caroline-hedtke-data.js";
      script.async = false;

      script.onload = function () {
        var status = document.getElementById("status");
        var output = document.getElementById("output");

        if (!window.AMELIA_HEDTKE_DATA || !window.AMELIA_HEDTKE_DATA.records) {
          status.textContent = "Data file loaded, but expected dataset variable was not found.";
          return;
        }

        status.textContent = "Dataset loaded successfully.";

        var records = window.AMELIA_HEDTKE_DATA.records;
        var matches = records.filter(function (r) {
          var text = JSON.stringify(r).toLowerCase();
          return text.includes("amelia") &&
                 text.includes("hedtke") &&
                 text.includes("carver county historical society");
        });

        if (matches.length === 0) {
          output.innerHTML = "<p>No matching Amelia Caroline Hedtke records were found.</p>";
          return;
        }

        var html = "";
        matches.forEach(function (row, index) {
          html += "<section>";
          html += "<h2>Record " + (index + 1) + "</h2>";
          html += "<dl>";
          Object.keys(row).forEach(function (key) {
            html += "<dt><strong>" + key + "</strong></dt>";
            html += "<dd>" + String(row[key]) + "</dd>";
          });
          html += "</dl>";
          html += "</section><hr>";
        });

        output.innerHTML = html;
      };

      script.onerror = function () {
        document.getElementById("status").textContent =
          "Could not load https://luedtkerice.j03.page/amelia-caroline-hedtke-data.js";
      };

      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
